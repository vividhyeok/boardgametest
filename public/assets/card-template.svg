<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="t d"><title id="t">다음 장면 카드 목업</title><desc id="d">A/B 선택이 한 장에 들어간 양방향 카드 디자인</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fffdf8"/><stop offset="1" stop-color="#f1e4cf"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2833" flood-opacity=".22"/></filter></defs><rect width="1200" height="780" rx="34" fill="#efe4d2"/><g transform="translate(160 48)" filter="url(#s)"><rect width="520" height="684" rx="34" fill="url(#bg)" stroke="#202631" stroke-width="8"/><line x1="36" x2="484" y1="342" y2="342" stroke="#b7aa97" stroke-width="4" stroke-dasharray="16 12"/><g transform="translate(48 40)"><rect width="424" height="88" rx="18" fill="#f7efe2" stroke="#d7c8b5"/><text x="22" y="38" font-family="Arial" font-size="28" font-weight="900" fill="#3f8061">● 씨앗</text><text x="22" y="70" font-family="Arial" font-size="22" fill="#65717f">14~18세 발견에 강함</text><text x="16" y="154" font-family="Arial" font-size="31" font-weight="900" fill="#202631">A. 직접 기획하거나</text><text x="16" y="198" font-family="Arial" font-size="31" font-weight="900" fill="#202631">만들어보기 시작한다</text><rect x="16" y="236" width="110" height="38" rx="19" fill="#bd7d27"/><text x="71" y="262" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900" fill="white">성장</text><rect x="138" y="236" width="110" height="38" rx="19" fill="#416aa9"/><text x="193" y="262" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900" fill="white">자유</text></g><g transform="rotate(180 260 513)"><rect x="48" y="382" width="424" height="88" rx="18" fill="#f7efe2" stroke="#d7c8b5"/><text x="70" y="420" font-family="Arial" font-size="28" font-weight="900" fill="#3f8061">● 씨앗</text><text x="70" y="452" font-family="Arial" font-size="22" fill="#65717f">카드를 돌리면 B 선택</text><text x="64" y="536" font-family="Arial" font-size="31" font-weight="900" fill="#202631">B. 잘 맞는 사람을 찾아</text><text x="64" y="580" font-family="Arial" font-size="31" font-weight="900" fill="#202631">함께 즐긴다</text><rect x="64" y="618" width="110" height="38" rx="19" fill="#b85757"/><text x="119" y="644" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900" fill="white">관계</text><rect x="186" y="618" width="132" height="38" rx="19" fill="#7056a2"/><text x="252" y="644" text-anchor="middle" font-family="Arial" font-size="20" font-weight="900" fill="white">즐거움</text></g><rect x="176" y="296" width="168" height="92" rx="20" fill="#202631"/><text x="260" y="334" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="white">게임과</text><text x="260" y="368" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="white">콘텐츠</text></g><g transform="translate(750 138)" font-family="Arial"><text font-size="36" font-weight="900" fill="#202631">인쇄용 카드 원칙</text><text y="72" font-size="25" fill="#303846">1. 키워드를 중앙에 크게 둔다</text><text y="122" font-size="25" fill="#303846">2. 종류는 색과 도형을 함께 쓴다</text><text y="172" font-size="25" fill="#303846">3. 선택 문장은 한 문장으로 줄인다</text><text y="222" font-size="25" fill="#303846">4. 가치는 작은 아이콘처럼 반복한다</text><rect y="292" width="320" height="118" rx="22" fill="#fffaf0" stroke="#d7c8b5"/><text x="24" y="342" font-size="25" font-weight="900" fill="#202631">한 세트 제작량</text><text x="24" y="386" font-size="24" fill="#65717f">A4 3장 = 카드 24장</text></g></svg>
