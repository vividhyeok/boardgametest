<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">다음 장면 카드 템플릿</title>
  <desc id="desc">A와 B 선택이 한 장에 들어간 양방향 카드 목업</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f1e4cf"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1">
      <stop offset="0" stop-color="#26313f"/>
      <stop offset="1" stop-color="#171d27"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2833" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="800" rx="36" fill="#efe5d4"/>
  <g transform="translate(180 54)" filter="url(#shadow)">
    <rect width="520" height="692" rx="34" fill="url(#paper)" stroke="#202631" stroke-width="8"/>
    <line x1="34" y1="346" x2="486" y2="346" stroke="#b9ab98" stroke-dasharray="16 12" stroke-width="4"/>
    <rect x="44" y="42" width="432" height="92" rx="18" fill="#f7efe2" stroke="#d7c8b5"/>
    <text x="64" y="80" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#3f8061">● 씨앗</text>
    <text x="64" y="116" font-family="Arial, sans-serif" font-size="24" fill="#65717f">14~18세 발견에 강함</text>
    <text x="64" y="190" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#202631">A. 직접 기획하거나</text>
    <text x="64" y="232" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#202631">만들어보기 시작한다</text>
    <g transform="translate(64 276)">
      <rect width="108" height="36" rx="18" fill="#bd7d27"/><text x="54" y="25" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="white">성장</text>
      <rect x="120" width="108" height="36" rx="18" fill="#416aa9"/><text x="174" y="25" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="white">자유</text>
    </g>
    <g transform="rotate(180 260 519)">
      <rect x="44" y="388" width="432" height="92" rx="18" fill="#f7efe2" stroke="#d7c8b5"/>
      <text x="64" y="426" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#3f8061">● 씨앗</text>
      <text x="64" y="462" font-family="Arial, sans-serif" font-size="24" fill="#65717f">카드를 돌리면 B 선택</text>
      <text x="64" y="536" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#202631">B. 잘 맞는 사람을 찾아</text>
      <text x="64" y="578" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#202631">함께 즐긴다</text>
      <g transform="translate(64 622)">
        <rect width="108" height="36" rx="18" fill="#b85757"/><text x="54" y="25" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="white">관계</text>
        <rect x="120" width="132" height="36" rx="18" fill="#7056a2"/><text x="186" y="25" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="white">즐거움</text>
      </g>
    </g>
    <rect x="178" y="300" width="164" height="92" rx="20" fill="url(#ink)"/>
    <text x="260" y="338" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="white">게임과</text>
    <text x="260" y="372" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="white">콘텐츠</text>
  </g>
  <g transform="translate(770 126)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#202631">카드 디자인 원칙</text>
    <g font-family="Arial, sans-serif" font-size="25" fill="#303846">
      <text x="0" y="70">1. 키워드는 중앙에 크게</text>
      <text x="0" y="120">2. 종류는 색 + 도형으로 표시</text>
      <text x="0" y="170">3. 선택지는 한 문장으로 압축</text>
      <text x="0" y="220">4. 가치는 아이콘처럼 반복 노출</text>
      <text x="0" y="270">5. B 선택은 180도 회전 인쇄</text>
    </g>
    <rect x="0" y="330" width="300" height="110" rx="20" fill="#fffaf0" stroke="#d7c8b5"/>
    <text x="24" y="374" font-family="Arial" font-size="24" font-weight="800" fill="#202631">제작 난이도</text>
    <text x="24" y="414" font-family="Arial" font-size="22" fill="#65717f">A4 3장 = 한 세트 24장</text>
  </g>
</svg>
