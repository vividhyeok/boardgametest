<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">개인 인생판 목업</title>
  <desc id="desc">네 시기, 비공개 목표, 시간 토큰, 편집권, 점수칸을 포함한 플레이어 보드</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#1f2833" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="1400" height="820" rx="36" fill="#efe4d2"/>
  <g transform="translate(70 58)" filter="url(#shadow)">
    <rect width="1260" height="704" rx="26" fill="#fffaf0" stroke="#202631" stroke-width="6"/>
    <rect x="34" y="34" width="1192" height="92" rx="18" fill="#f6eddf" stroke="#d4c4ad"/>
    <text x="62" y="78" font-family="Arial" font-size="30" font-weight="900" fill="#202631">가상 인물</text>
    <text x="230" y="78" font-family="Arial" font-size="26" fill="#65717f">이름: ________   성격: ___   시작 상황: ___</text>
    <g transform="translate(34 158)">
      <g>
        <rect width="285" height="330" rx="18" fill="#fffdf8" stroke="#b8aa96" stroke-width="4" stroke-dasharray="14 10"/>
        <text x="22" y="42" font-family="Arial" font-size="25" font-weight="900" fill="#202631">14~18세</text>
        <text x="22" y="78" font-family="Arial" font-size="22" fill="#65717f">발견</text>
        <rect x="22" y="258" width="112" height="36" rx="18" fill="#3f8061"/><text x="78" y="283" text-anchor="middle" font-family="Arial" font-size="20" font-weight="800" fill="white">씨앗 +1</text>
      </g>
      <g transform="translate(302 0)">
        <rect width="285" height="330" rx="18" fill="#fffdf8" stroke="#b8aa96" stroke-width="4" stroke-dasharray="14 10"/>
        <text x="22" y="42" font-family="Arial" font-size="25" font-weight="900" fill="#202631">19~24세</text>
        <text x="22" y="78" font-family="Arial" font-size="22" fill="#65717f">출발</text>
        <rect x="22" y="258" width="112" height="36" rx="18" fill="#bd7d27"/><text x="78" y="283" text-anchor="middle" font-family="Arial" font-size="20" font-weight="800" fill="white">기회 +1</text>
      </g>
      <g transform="translate(604 0)">
        <rect width="285" height="330" rx="18" fill="#fffdf8" stroke="#b8aa96" stroke-width="4" stroke-dasharray="14 10"/>
        <text x="22" y="42" font-family="Arial" font-size="25" font-weight="900" fill="#202631">25~39세</text>
        <text x="22" y="78" font-family="Arial" font-size="22" fill="#65717f">흔들림</text>
        <rect x="22" y="258" width="112" height="36" rx="18" fill="#416aa9"/><text x="78" y="283" text-anchor="middle" font-family="Arial" font-size="20" font-weight="800" fill="white">변수 +1</text>
      </g>
      <g transform="translate(906 0)">
        <rect width="285" height="330" rx="18" fill="#fffdf8" stroke="#b8aa96" stroke-width="4" stroke-dasharray="14 10"/>
        <text x="22" y="42" font-family="Arial" font-size="25" font-weight="900" fill="#202631">그 이후</text>
        <text x="22" y="78" font-family="Arial" font-size="22" fill="#65717f">다음 장면</text>
        <rect x="22" y="258" width="112" height="36" rx="18" fill="#b85757"/><text x="78" y="283" text-anchor="middle" font-family="Arial" font-size="20" font-weight="800" fill="white">사람 +1</text>
      </g>
    </g>
    <g transform="translate(34 520)">
      <rect width="286" height="130" rx="18" fill="#f6eddf" stroke="#d4c4ad"/>
      <text x="22" y="42" font-family="Arial" font-size="23" font-weight="900" fill="#202631">비공개 삶의 방향</text>
      <rect x="22" y="64" width="86" height="42" rx="10" fill="#7056a2"/><text x="65" y="92" text-anchor="middle" font-family="Arial" font-size="21" font-weight="800" fill="white">엎음</text>
      <rect x="338" width="286" height="130" rx="18" fill="#f6eddf" stroke="#d4c4ad"/>
      <text x="360" y="42" font-family="Arial" font-size="23" font-weight="900" fill="#202631">남은 시간</text>
      <g transform="translate(360 64)"><circle cx="18" cy="18" r="16" fill="#d8a346" stroke="#795017"/><circle cx="58" cy="18" r="16" fill="#d8a346" stroke="#795017"/><circle cx="98" cy="18" r="16" fill="#d8a346" stroke="#795017"/><circle cx="138" cy="18" r="16" fill="#d8a346" stroke="#795017"/></g>
      <rect x="676" width="210" height="130" rx="18" fill="#f6eddf" stroke="#d4c4ad"/>
      <text x="698" y="42" font-family="Arial" font-size="23" font-weight="900" fill="#202631">편집권</text>
      <text x="698" y="88" font-family="Arial" font-size="22" fill="#65717f">미사용 □</text>
      <rect x="938" width="253" height="130" rx="18" fill="#f6eddf" stroke="#d4c4ad"/>
      <text x="960" y="42" font-family="Arial" font-size="23" font-weight="900" fill="#202631">점수</text>
      <text x="960" y="82" font-family="Arial" font-size="21" fill="#65717f">시기 / 연결 / 방향 / 시간</text>
    </g>
  </g>
</svg>
